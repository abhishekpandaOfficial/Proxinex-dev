services:

  postgres:
    image: postgres:16
    container_name: proxinex-postgres
    environment:
      POSTGRES_USER: proxinex
      POSTGRES_PASSWORD: proxinex
      POSTGRES_DB: proxinex
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: proxinex-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: proxinex-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"

  pgadmin:
    image: dpage/pgadmin4
    container_name: proxinex-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: hello@abhishekpanda.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"

  minio:
    image: minio/minio
    container_name: proxinex-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: proxinex-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"