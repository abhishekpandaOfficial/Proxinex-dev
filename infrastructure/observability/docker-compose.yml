services:

  prometheus:
    image: prom/prometheus
    container_name: proxinex-prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: proxinex-grafana
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki
    container_name: proxinex-loki
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo
    container_name: proxinex-tempo
    ports:
      - "3200:3200"